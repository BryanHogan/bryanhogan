# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: BryanHogan/bryanhogan
  branch: main

media_folder: src/assets
public_folder: /assets

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    format: yaml-frontmatter
    slug: "{{slug}}"
    media_folder: ../blog-assets/images
    public_folder: ../blog-assets/images
    fields:
      - label: Title
        name: title
        widget: string
        required: true
        minlength: 10
        maxlength: 65

      - label: Description
        name: description
        widget: string
        required: true
        minlength: 50
        maxlength: 162

      - label: Cover Image
        name: coverImage
        widget: image
        required: false
        media_folder: ../blog-assets/covers
        public_folder: ../blog-assets/covers
        hint: "Upload a cover image. Either this or Emoji must be provided."

      - label: Emoji
        name: emoji
        widget: string
        required: false
        hint: "A single emoji character. Either this or Cover Image must be provided."

      - label: Publish Date
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        picker_utc: true
        required: true

      - label: Last Update
        name: lastUpdate
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        picker_utc: true
        required: false

      - label: Bluesky Reference
        name: blueskyRef
        widget: string
        required: false

      - label: Mastodon Reference
        name: mastodonRef
        widget: string
        required: false

      - label: Threads Reference
        name: threadsRef
        widget: string
        required: false

      - label: Tags
        name: tags
        widget: list
        required: true

      - label: Body
        name: body
        widget: markdown
